<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учёт заказов</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        /* Стили из вашего исходного кода */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a1a 0%, #2d1f16 50%, #1a1a1a 100%);
            min-height: 100vh;
            padding: 15px;
            color: #e8e0d5;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; margin-bottom: 20px; }
        .card {
            background: #24201c;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 15px;
            border: 1px solid #3d3128;
        }
        .form-group { margin-bottom: 15px; }
        label {
            display: block;
            margin-bottom: 6px;
            color: #b8a89a;
            font-size: 0.85rem;
        }
        input, select, textarea {
            width: 100%;
            padding: 14px;
            border: 1px solid #4a3f35;
            border-radius: 10px;
            background: #1a1714;
            color: #e8e0d5;
            font-family: inherit;
        }
        .btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #5c3d2e 0%, #3d2817 100%);
            color: #e8e0d5;
            cursor: pointer;
        }
        .btn-success {
            background: linear-gradient(135deg, #4a5c3d 0%, #2d3d28 100%);
        }
        .stats {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .stat-box {
            background: #2d2018;
            padding: 14px;
            border-radius: 10px;
            flex: 1;
            text-align: center;
        }
        .order-item {
            background: #1f1b17;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            border-left: 3px solid #6b4e3d;
            position: relative;
        }
        .delete-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: #8b3d3d;
            font-size: 1.6rem;
            cursor: pointer;
        }
        .admin-badge {
            background: #4a5c3d;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-left: 6px;
        }
        .user-info {
            background: #2d3d4a;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: center;
        }
        .filter {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
        }
        .filter-btn {
            flex: 1;
            padding: 10px;
            background: #2d2824;
            border: 1px solid #3d3128;
            border-radius: 8px;
            color: #8b7a6a;
            cursor: pointer;
        }
        .filter-btn.active {
            background: #3d2817;
            border-color: #8b5a2b;
            color: #e8e0d5;
        }
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(45, 32, 24, 0.95);
            padding: 16px 24px;
            border-radius: 12px;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 3000;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Учёт заказов</h1>
            <p id="status">⏳ Подключение...</p>
        </div>

        <div id="userInfo" class="user-info">Загрузка...</div>

        <div class="card">
            <div class="form-group">
                <label>№ ЗСО/ЗНД *</label>
                <input type="text" id="zso" placeholder="Введите номер">
            </div>
            <div class="form-group">
                <label>Телефон</label>
                <input type="tel" id="phone" placeholder="+7 (___) ___-__-__">
            </div>
            <div class="form-group">
                <label>Услуга *</label>
                <select id="service">
                    <option value="">Выберите услугу</option>
                    <option value="Демонтаж вытяжки" data-price="575">Демонтаж вытяжки — 575₽</option>
                    <option value="Монтаж духовки" data-price="1600">Монтаж духовки — 1 600₽</option>
                    <option value="Монтаж варочной панели" data-price="1900">Монтаж варочной панели — 1 900₽</option>
                    <option value="ТВ до 43&quot;" data-price="1250">ТВ до 43" — 1 250₽</option>
                    <option value="ТВ 50&quot;-55&quot;" data-price="2000">ТВ 50"-55" — 2 000₽</option>
                    <option value="Монтаж вытяжки" data-price="1350">Монтаж вытяжки — 1 350₽</option>
                </select>
            </div>
            <div class="form-group">
                <label>Примечания</label>
                <textarea id="notes" placeholder="Доп. информация..."></textarea>
            </div>
            <button class="btn" onclick="addOrder()">✓ ДОБАВИТЬ ЗАКАЗ</button>
        </div>

        <!-- Админ панель -->
        <div id="adminPanel" class="card" style="display:none;">
            <h3 style="margin-bottom:12px;">👑 Админ-панель</h3>
            
            <div class="filter">
                <button class="filter-btn active" onclick="setFilter('all')">Все заказы</button>
                <button class="filter-btn" onclick="setFilter('my')">Мои заказы</button>
            </div>

            <div style="margin-top:15px;">
                <h4>📅 Месячный отчёт</h4>
                <p>Текущий месяц: <span id="currentMonth"></span></p>
                <p>Заказов: <span id="monthOrders">0</span></p>
                <p>Сумма: <span id="monthSum">0₽</span></p>
                <button class="btn btn-success" onclick="generateMonthlyReport()" style="margin-top:10px;">Сформировать отчёт</button>
                <button class="btn" onclick="clearMonthlyOrders()" style="margin-top:10px;background:#8b3d3d;">Очистить месяц</button>
            </div>
        </div>

        <div class="card">
            <div class="stats">
                <div class="stat-box"><h3 id="totalOrders">0</h3><p>Заказов</p></div>
                <div class="stat-box"><h3 id="totalSum">0₽</h3><p>Сумма</p></div>
            </div>

            <button class="btn btn-success" onclick="downloadXLSX()">📊 Выгрузка в Excel</button>

            <h3 style="margin:12px 0;">📋 Список заказов</h3>
            <div id="ordersList"></div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // Firebase конфигурация (ваши данные)
        const firebaseConfig = {
            apiKey: "AIzaSyAtAtC5t7ycUjOIWPB5GGngiyDo-riS_6M",
            authDomain: "orders-app-3d46a.firebaseapp.com",
            databaseURL: "https://orders-app-3d46a-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "orders-app-3d46a",
            storageBucket: "orders-app-3d46a.appspot.com",
            messagingSenderId: "879326100377",
            appId: "1:879326100377:web:681fe6393d7f327963108"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Глобальные переменные
        let currentUser = null;
        let isAdmin = false;
        let currentFilter = 'all';
        let allOrders = [];

        // Telegram WebApp
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.ready();
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            initUser();
            loadOrders();
        });

        function initUser() {
            const tgUser = tg?.initDataUnsafe?.user;
            
            if (tgUser) {
                // Пользователь из Telegram
                currentUser = {
                    id: `user_${tgUser.id}`,
                    name: tgUser.username || tgUser.first_name || 'Пользователь',
                    isAdmin: checkIsAdmin(tgUser.id)
                };
            } else {
                // Локальный режим
                let localId = localStorage.getItem('local_user_id');
                if (!localId) {
                    localId = `user_${Math.random().toString(36).substr(2, 9)}`;
                    localStorage.setItem('local_user_id', localId);
                }
                currentUser = {
                    id: localId,
                    name: localId,
                    isAdmin: false
                };
            }

            isAdmin = currentUser.isAdmin;
            
            document.getElementById('userInfo').innerHTML = `
                👤 ${currentUser.name} ${isAdmin ? '<span class="admin-badge">АДМИН</span>' : ''}
            `;

            if (isAdmin) {
                document.getElementById('adminPanel').style.display = 'block';
            }
        }

        function checkIsAdmin(userId) {
            // ЗАМЕНИТЕ НА ВАШ TELEGRAM ID!
            const adminIds = [5059571966];
            return adminIds.includes(userId);
        }

        function loadOrders() {
            document.getElementById('status').textContent = '🔄 Синхронизация...';
            
            const ordersRef = database.ref('orders');
            
            ordersRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    // Преобразуем объект в массив
                    allOrders = Object.keys(data).map(key => ({
                        id: key,
                        ...data[key]
                    }));
                } else {
                    allOrders = [];
                }
                
                updateDisplay();
                document.getElementById('status').innerHTML = '<span style="color:#4a5c3d;">✅ Подключено</span>';
            }, (error) => {
                console.error('Ошибка загрузки:', error);
                document.getElementById('status').textContent = '❌ Ошибка подключения';
            });
        }

        function addOrder() {
            const zso = document.getElementById('zso').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const serviceSelect = document.getElementById('service');
            const service = serviceSelect.value;
            const price = serviceSelect.options[serviceSelect.selectedIndex]?.getAttribute('data-price') || 0;
            const notes = document.getElementById('notes').value.trim();

            if (!zso) { showToast('Введите номер ЗСО/ЗНД'); return; }
            if (!service) { showToast('Выберите услугу'); return; }

            const now = new Date();
            const order = {
                userId: currentUser.id,
                userName: currentUser.name,
                zsoNumber: zso,
                phone: phone,
                service: service,
                price: parseInt(price),
                notes: notes,
                date: now.toLocaleString('ru-RU'),
                month: `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`,
                timestamp: now.getTime()
            };

            // Сохраняем в Firebase
            const newOrderRef = database.ref('orders').push();
            newOrderRef.set(order)
                .then(() => {
                    showToast('✅ Заказ добавлен!');
                    
                    // Очистка формы
                    document.getElementById('zso').value = '';
                    document.getElementById('phone').value = '';
                    document.getElementById('service').selectedIndex = 0;
                    document.getElementById('notes').value = '';
                })
                .catch((error) => {
                    console.error('Ошибка сохранения:', error);
                    showToast('❌ Ошибка сохранения');
                });
        }

        function deleteOrder(orderId) {
            if (!confirm('Удалить заказ?')) return;

            database.ref(`orders/${orderId}`).remove()
                .then(() => {
                    showToast('✅ Заказ удалён');
                })
                .catch((error) => {
                    console.error('Ошибка удаления:', error);
                    showToast('❌ Ошибка удаления');
                });
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            updateDisplay();
        }

        function updateDisplay() {
            let filteredOrders = allOrders;
            
            if (!isAdmin || currentFilter === 'my') {
                filteredOrders = allOrders.filter(o => o.userId === currentUser.id);
            }
            
            renderOrders(filteredOrders);
            updateStats(filteredOrders);
            updateMonthStats();
        }

        function renderOrders(orders) {
            const list = document.getElementById('ordersList');
            
            if (orders.length === 0) {
                list.innerHTML = '<p style="text-align:center;color:#5c4d42;padding:40px;">Нет заказов</p>';
                return;
            }

            // Сортируем по дате (сначала новые)
            orders.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));

            list.innerHTML = orders.map(o => `
                <div class="order-item">
                    ${isAdmin && o.userName ? `<span style="background:#3d4a5c;color:#d4e0e8;padding:2px 8px;border-radius:4px;font-size:0.7rem;display:inline-block;margin-bottom:6px;">👤 ${o.userName}</span>` : ''}
                    <button class="delete-btn" onclick="deleteOrder('${o.id}')">×</button>
                    <h4>№ ${escapeHtml(o.zsoNumber)}</h4>
                    <p>🔧 ${escapeHtml(o.service)}</p>
                    <p class="price">${Number(o.price).toLocaleString()} ₽</p>
                    ${o.phone ? `<p>📞 ${escapeHtml(o.phone)}</p>` : ''}
                    ${o.notes ? `<p>📝 ${escapeHtml(o.notes)}</p>` : ''}
                    <div style="font-size:0.75rem;color:#6b5a4a;margin-top:8px;">${o.date || ''}</div>
                </div>
            `).join('');
        }

        function updateStats(orders) {
            document.getElementById('totalOrders').textContent = orders.length;
            const sum = orders.reduce((a, o) => a + (Number(o.price) || 0), 0);
            document.getElementById('totalSum').textContent = sum.toLocaleString() + '₽';
        }

        function updateMonthStats() {
            const now = new Date();
            const currentMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            
            const monthOrders = allOrders.filter(o => o.month === currentMonth);
            const monthSum = monthOrders.reduce((a, o) => a + (Number(o.price) || 0), 0);
            
            document.getElementById('currentMonth').textContent = formatMonth(currentMonth);
            document.getElementById('monthOrders').textContent = monthOrders.length;
            document.getElementById('monthSum').textContent = monthSum.toLocaleString() + '₽';
        }

        function generateMonthlyReport() {
            if (!confirm('Сформировать месячный отчёт?')) return;

            const now = new Date();
            const currentMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            const monthOrders = allOrders.filter(o => o.month === currentMonth);

            if (monthOrders.length === 0) {
                showToast('Нет заказов за этот месяц');
                return;
            }

            // Создаём Excel файл
            const data = [
                ['📊 МЕСЯЧНЫЙ ОТЧЁТ'],
                [`Период: ${formatMonth(currentMonth)}`],
                ['Дата формирования:', new Date().toLocaleString('ru-RU')],
                [],
                ['№', 'Дата', 'Сотрудник', '№ ЗСО', 'Телефон', 'Услуга', 'Сумма', 'Примечания']
            ];

            monthOrders.forEach((o, i) => {
                data.push([
                    i + 1,
                    o.date || '',
                    o.userName || '',
                    o.zsoNumber || '',
                    o.phone || '',
                    o.service || '',
                    o.price || 0,
                    o.notes || ''
                ]);
            });

            const totalSum = monthOrders.reduce((sum, o) => sum + (Number(o.price) || 0), 0);
            data.push(
                [],
                ['ИТОГО:', '', '', '', 'Заказов:', monthOrders.length, 'Сумма:', totalSum]
            );

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(data);
            XLSX.utils.book_append_sheet(wb, ws, 'Месячный отчёт');

            const fileName = `отчёт_${currentMonth}.xlsx`;
            XLSX.writeFile(wb, fileName);
            
            showToast('✅ Отчёт сформирован');
        }

        function clearMonthlyOrders() {
            if (!confirm('Очистить все заказы за текущий месяц? Это действие нельзя отменить!')) return;

            const now = new Date();
            const currentMonth = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;
            
            const monthOrderIds = allOrders
                .filter(o => o.month === currentMonth)
                .map(o => o.id);

            if (monthOrderIds.length === 0) {
                showToast('Нет заказов за этот месяц');
                return;
            }

            // Удаляем каждый заказ
            const promises = monthOrderIds.map(id => database.ref(`orders/${id}`).remove());
            
            Promise.all(promises)
                .then(() => {
                    showToast(`✅ Очищено ${monthOrderIds.length} заказов`);
                })
                .catch(error => {
                    console.error('Ошибка очистки:', error);
                    showToast('❌ Ошибка при очистке');
                });
        }

        function downloadXLSX() {
            let orders = allOrders;
            
            if (!isAdmin || currentFilter === 'my') {
                orders = allOrders.filter(o => o.userId === currentUser.id);
            }

            if (orders.length === 0) {
                showToast('Нет заказов для выгрузки');
                return;
            }

            const data = [
                ['📋 УЧЁТ ЗАКАЗОВ'],
                ['Дата выгрузки:', new Date().toLocaleString('ru-RU')],
                [],
                ['№', 'Дата', 'Сотрудник', '№ ЗСО', 'Телефон', 'Услуга', 'Сумма', 'Примечания']
            ];

            orders.forEach((o, i) => {
                data.push([
                    i + 1,
                    o.date || '',
                    o.userName || '',
                    o.zsoNumber || '',
                    o.phone || '',
                    o.service || '',
                    o.price || 0,
                    o.notes || ''
                ]);
            });

            const totalSum = orders.reduce((sum, o) => sum + (Number(o.price) || 0), 0);
            data.push(
                [],
                ['ИТОГО:', '', '', '', 'Заказов:', orders.length, 'Сумма:', totalSum]
            );

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(data);
            XLSX.utils.book_append_sheet(wb, ws, 'Заказы');

            const fileName = `заказы_${new Date().toISOString().slice(0,10)}.xlsx`;
            XLSX.writeFile(wb, fileName);
            
            showToast('✅ Файл скачан');
        }

        function formatMonth(monthKey) {
            const [year, month] = monthKey.split('-');
            const months = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь',
                           'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
            return `${months[parseInt(month) - 1]} ${year}`;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Форматирование телефона
        document.getElementById('phone').addEventListener('input', function(e) {
            let x = e.target.value.replace(/\D/g, '').match(/(\d{0,1})(\d{0,3})(\d{0,3})(\d{0,2})(\d{0,2})/);
            e.target.value = !x[2] ? x[1] : '+7 (' + x[2] + ') ' + x[3] + (x[4] ? '-' + x[4] : '') + (x[5] ? '-' + x[5] : '');
        });
    </script>
</body>
</html>
